<!DOCTYPE html>
<html>

<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container mt-4">
        <div class="navbar">

            <!-- LEFT -->
            <div class="nav-left">
                <img src="home page 7.avif" class="logo-img">
                <span class="logo-text">CourierPro</span>
            </div>

            <!-- CENTER -->
            <div class="nav-links">
                <a href="#">Dashboard</a>
                <a href="#">Parcels</a>
                <a href="#">Tracking</a>
                <a href="#">Reports</a>
            </div>

            <!-- RIGHT -->
            <div class="nav-right">
                <button class="track-btn" onclick="goHome()">Track Parcel</button>
            </div>

        </div>

        <!-- Add Parcel -->
        <div class="card p-3 my-3">
            <h4>Add Parcel</h4>
            <input id="tid" class="form-control my-2" placeholder="Tracking ID">
            <input id="sender" class="form-control my-2" placeholder="Sender">
            <input id="receiver" class="form-control my-2" placeholder="Receiver">
            <button class="btn btn-success" onclick="addParcel()">Add</button>
        </div>

        <!-- Update Status -->
        <div class="card p-3 my-3">
            <h4>Update Status</h4>
            <input id="tid2" class="form-control my-2" placeholder="Tracking ID">
            <input id="status" class="form-control my-2" placeholder="Status">
            <input id="location" class="form-control my-2" placeholder="Location">
            <button class="btn btn-warning" onclick="updateStatus()">Update</button>
        </div>

        <!-- All Parcels -->
        <div class="card p-3">
            <h4>All Parcels</h4>
            <button class="btn btn-primary mb-2" onclick="loadParcels()">Load</button>
            <div id="list"></div>
        </div>
    </div>

    <script>
        function addParcel() {
            fetch("http://localhost:5000/add-parcel", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    tracking_id: tid.value,
                    sender_name: sender.value,
                    receiver_name: receiver.value
                })
            }).then(res => res.text()).then(alert);
        }

        function updateStatus() {
            let tracking_id = document.getElementById("tid2").value;
            let status = document.getElementById("status").value;
            let location = document.getElementById("location").value;

            fetch(`http://localhost:5000/add-status?tracking_id=${tracking_id}&status=${status}&location=${location}`)
                .then(res => res.text())
                .then(data => {
                    alert("Status Added ✅");
                });
        }

        function loadParcels() {
            fetch("http://localhost:5000/all")
                .then(res => res.json())
                .then(data => {
                    let out = "";
                    data.forEach(p => {
                        out += `<p>${p.tracking_id} | ${p.sender_name} → ${p.receiver_name}</p>`;
                    });
                    list.innerHTML = out;
                });
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
